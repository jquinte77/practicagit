<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
    }

    header {
      background: #111;
      padding: 15px;
      position: sticky;
      top: 0;
    }

    nav ul {
      display: flex;
      justify-content: center;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav ul li {
      margin: 0 20px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    #hero {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      padding: 100px 20px;
    }

    #hero h1 {
      font-size: 2.5em;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #111;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #333;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #f4f4f4;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
    }

    form {
      max-width: 400px;
      margin: auto;
      text-align: left;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    footer {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <nav>
    <ul>
      <li><a href="#hero">Inicio</a></li>
      <li><a href="#beneficios">Servicios</a></li>
      <li><a href="#contacto">Contacto</a></li>
    </ul>
  </nav>
</header>

<section id="hero">
  <h1>Diseño de páginas web modernas</h1>
  <p>Consigue tu web profesional en pocos días</p>
  <a href="#contacto"><button>Contáctame</button></a>
</section>

<section id="beneficios">
  <h2>¿Por qué elegirme?</h2>
  <div class="cards">
    <div class="card">
      <h3>Diseño atractivo</h3>
      <p>Webs modernas y visuales</p>
    </div>
    <div class="card">
      <h3>Responsive</h3>
      <p>Adaptado a móviles y tablets</p>
    </div>
    <div class="card">
      <h3>Rápido</h3>
      <p>Entrega en pocos días</p>
    </div>
  </div>
</section>

<section id="contacto">
  <h2>Contacto</h2>
  <form>
    <label>Nombre</label>
    <input type="text" required>

    <label>Email</label>
    <input type="email" required>

    <label>Mensaje</label>
    <textarea rows="5" required></textarea>

    <button type="submit">Enviar</button>
  </form>
</section>

<footer>
  <p>© 2026 Landing Page</p>
</footer>

</body>
</html>
